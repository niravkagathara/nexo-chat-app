name: nexochat
description: Nexo Chat Mobile WebView Application in Flutter

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  webview_flutter: ^4.10.0
  permission_handler: ^12.0.3
  shared_preferences: ^2.3.2
  socket_io_client: ^3.1.2
  flutter_local_notifications: ^22.0.1
  http: ^1.2.2
  flutter_background_service: ^5.0.7
  webview_flutter_android: ^4.13.0
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
