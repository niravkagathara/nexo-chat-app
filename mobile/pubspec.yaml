name: nexochat
description: Nexo Chat Mobile WebView Application in Flutter

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  webview_flutter: ^4.10.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  socket_io_client: ^3.1.2
  flutter_local_notifications: ^17.2.2
  http: ^1.2.2
  flutter_background_service: ^5.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
